name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Explicitly grant the permissions required by the action
permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.resolve.outputs.list }}
      modules: ${{ steps.resolve.outputs.modules }}
      build-all: ${{ steps.resolve.outputs.build-all }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            contracts:
              - 'pom.xml'
              - 'contracts/**'
            geo-scoring:
              - 'geo-scoring/**'
            fraud-detection:
              - 'fraud-detection/**'
            decision-engine:
              - 'decision-engine/**'

      - name: Resolve modules
        id: resolve
        env:
          FILTER_CONTRACTS: ${{ steps.filter.outputs.contracts }}
          FILTER_GEO_SCORING: ${{ steps.filter.outputs.geo-scoring }}
          FILTER_FRAUD_DETECTION: ${{ steps.filter.outputs.fraud-detection }}
          FILTER_DECISION_ENGINE: ${{ steps.filter.outputs.decision-engine }}
        run: npx tsx .github/scripts/resolve-modules.ts

  build:
    needs: changes
    if: needs.changes.outputs.list != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build & unit-test changed modules
        run: |
          ./mvnw -pl "${{ needs.changes.outputs.list }}" -am verify -DskipITs --batch-mode --no-transfer-progress

  integration-tests:
    needs: [ changes, build ]
    if: needs.changes.outputs.list != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Install the changed modules and their upstream dependencies (no tests) so the failsafe
      # goals below resolve them from the local repo and run against the compiled test classes.
      - name: Build dependencies
        run: |
          ./mvnw -pl "${{ needs.changes.outputs.list }}" -am install -DskipTests --batch-mode --no-transfer-progress

      # Run integration tests for the changed modules ONLY (no -am), via the failsafe goals
      # directly so surefire unit tests are not re-run (they ran in the build job). This also keeps
      # an upstream module's ITs (e.g. geo-scoring's Nominatim container) from re-running when only
      # a downstream module changed. Testcontainers uses the Docker daemon preinstalled on the runner.
      - name: Integration tests (changed modules)
        run: |
          ./mvnw -pl "${{ needs.changes.outputs.list }}" failsafe:integration-test failsafe:verify --batch-mode --no-transfer-progress
