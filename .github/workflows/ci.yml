name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Explicitly grant the permissions required by the action
permissions:
  contents: read
  pull-requests: read
  checks: write        # post test annotations

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.resolve.outputs.list }}
      modules: ${{ steps.resolve.outputs.modules }}
      build-all: ${{ steps.resolve.outputs.build-all }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            contracts:
              - 'pom.xml'
              - 'contracts/**'
            geo-scoring:
              - 'geo-scoring/**'
            fraud-detection:
              - 'fraud-detection/**'
            decision-engine:
              - 'decision-engine/**'

      - name: Resolve modules
        id: resolve
        env:
          FILTER_CONTRACTS: ${{ steps.filter.outputs.contracts }}
          FILTER_GEO_SCORING: ${{ steps.filter.outputs.geo-scoring }}
          FILTER_FRAUD_DETECTION: ${{ steps.filter.outputs.fraud-detection }}
          FILTER_DECISION_ENGINE: ${{ steps.filter.outputs.decision-engine }}
        run: npx tsx .github/scripts/resolve-modules.ts
      - name: Debug filter outputs
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Filter contracts: ${{ steps.filter.outputs.contracts }}"
          echo "Filter geo-scoring: ${{ steps.filter.outputs.geo-scoring }}"
          echo "Filter fraud-detection: ${{ steps.filter.outputs.fraud-detection }}"
          echo "Filter decision-engine: ${{ steps.filter.outputs.decision-engine }}"
          echo "Resolved list: ${{ steps.resolve.outputs.list }}"
          echo "Resolved modules: ${{ steps.resolve.outputs.modules }}"
          echo "Resolved build-all: ${{ steps.resolve.outputs.build-all }}"

  build-test:
    needs: changes
    if: needs.changes.outputs.list != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build, unit test, and install
        run: |
          ./mvnw -pl "${{ needs.changes.outputs.list }}" -am install -DskipITs --batch-mode --no-transfer-progress

      - name: Integration tests
        run: |
          ./mvnw -pl "${{ needs.changes.outputs.list }}" failsafe:integration-test failsafe:verify --batch-mode --no-transfer-progress

      # ── Test Reports ─────────────────────────────────────────────
      - name: Publish unit test report
        uses: dorny/test-reporter@v1
        if: success() || failure()    # run even if tests fail
        with:
          name: Unit Tests
          path: '*/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Publish integration test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Integration Tests
          path: '*/target/failsafe-reports/*.xml'
          reporter: java-junit