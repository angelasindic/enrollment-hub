server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: fraud-detection
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        prefetch: ${RABBITMQ_LISTENER_PREFETCH:16}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

fraud-detection:
  amqp:
    confirm-timeout: ${FRAUD_DETECTION_AMQP_CONFIRM_TIMEOUT:5s}
