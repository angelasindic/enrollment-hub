services:

  redis:
    image: valkey/valkey:8-alpine
    command: [ "valkey-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: enrollmenthub
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d enrollmenthub" ]
      interval: 5s
      timeout: 3s
      retries: 5

  libpostal:
    image: pelias/libpostal-service:latest
    ports:
      - "4400:4400"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf 'http://localhost:4400/expand?address=test'" ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  nominatim:
    image: mediagis/nominatim@sha256:3c49ad9443baab1f1ea13a6b1355fa377ae5fb0874dc328cba9b97a0ca7914bb
    ports:
      - "8088:8080"
    environment:
      NOMINATIM_PASSWORD: ${NOMINATIM_PASSWORD:-nominatim}
      THREADS: 4
      # Postgres memory (sized for 10G container limit)
      POSTGRES_SHARED_BUFFERS: 1GB
      POSTGRES_MAINTENANCE_WORK_MEM: 2GB
      POSTGRES_WORK_MEM: 50MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 4GB
      POSTGRES_SYNCHRONOUS_COMMIT: "off"
      PBF_URL: ${NOMINATIM_PBF_URL:-https://download.geofabrik.de/europe/netherlands-latest.osm.pbf}
      REPLICATION_URL: ${NOMINATIM_REPLICATION_URL:-https://download.geofabrik.de/europe/netherlands-updates/}
      IMPORT_STYLE: ${NOMINATIM_IMPORT_STYLE:-address}
    deploy:
      resources:
        limits:
          memory: 10G
    volumes:
      - nominatim-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/status || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10m
    shm_size: 1g

volumes:
  nominatim-data:
  postgres-data:
  redis-data:
  rabbitmq-data:


