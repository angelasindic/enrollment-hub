server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: geo-scoring
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

libpostal:
  host: localhost
  port: 4400

geocoding:
  cache:
    hmac-secret: ${GEOCODING_CACHE_HMAC_SECRET}
    ttl: ${GEOCODING_CACHE_TTL:P90D}

nominatim:
  scheme: ${NOMINATIM_SCHEME:http}
  host: ${NOMINATIM_HOST:localhost}
  port: ${NOMINATIM_PORT:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

geo-scoring:
  amqp:
    confirm-timeout: ${GEO_SCORING_AMQP_CONFIRM_TIMEOUT:5s}

geo-index:
  key-prefix: ${GEO_INDEX_KEY_PREFIX:geo}
  search-limit: ${GEO_INDEX_SEARCH_LIMIT:200}
  ttl: ${GEO_INDEX_TTL:PT48H}
  cleanup-batch-size: ${GEO_INDEX_CLEANUP_BATCH_SIZE:1000}
  cleanup-interval: ${GEO_INDEX_CLEANUP_INTERVAL:PT1H}
  radii:
    - radius: 100
      threshold: 5
      risk-level: HIGH
    - radius: 250
      threshold: 8
      risk-level: MEDIUM
    - radius: 500
      threshold: 12
      risk-level: LOW